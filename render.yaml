databases:
  - name: post-stroke-postgres
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: keyvalue
    name: post-stroke-redis
    plan: free
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: post-stroke-api
    runtime: ruby
    plan: starter
    region: oregon
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: post-stroke-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: post-stroke-redis
          property: connectionString
      - key: APP_HOST
        sync: false
      - key: FRONTEND_APP_ORIGIN
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER_NAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false

  - type: worker
    name: post-stroke-sidekiq
    runtime: ruby
    plan: starter
    region: oregon
    buildCommand: bundle install
    startCommand: bundle exec sidekiq
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        fromService:
          type: web
          name: post-stroke-api
          envVarKey: SECRET_KEY_BASE
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: post-stroke-api
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: post-stroke-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: post-stroke-redis
          property: connectionString
      - key: APP_HOST
        sync: false
      - key: FRONTEND_APP_ORIGIN
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER_NAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
